# filepath: azure-deploy/docker-compose.yaml
# Docker Compose for Hyperledger Fabric on Azure Free Tier
# Single VM configuration: CA + Orderer + Peer
# Not production-ready - for development/testing only

version: '3.9'

services:
  # Certificate Authority
  ca:
    image: hyperledger/fabric-ca:latest
    container_name: fabric-ca
    ports:
      - "7054:7054"
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca
      - FABRIC_CA_SERVER_TLS_ENABLED=true
      - FABRIC_CA_SERVER_TLS_CERTFILE=/etc/hyperledger/fabric-ca-server/tls-cert.pem
      - FABRIC_CA_SERVER_TLS_KEYFILE=/etc/hyperledger/fabric-ca-server/tls-key.pem
    volumes:
      - ca-data:/etc/hyperledger/fabric-ca-server
    command: sh -c 'fabric-ca-server start -b admin:adminpw -d'
    networks:
      - fabric-network

  # Orderer (Solo for dev)
  orderer:
    image: hyperledger/fabric-orderer:latest
    container_name: fabric-orderer
    ports:
      - "7050:7050"
      - "7053:7053"
    environment:
      - FABRIC_ORDERER_ID=orderer.example.com
      - FABRIC_ORDERER_LISTENADDRESS=0.0.0.0:7050
      - FABRIC_ORDERER_GENESISMETHOD=file
      - FABRIC_ORDERER_GENESISFILE=/etc/hyperledger/fabric/orderer/genesis.block
      - FABRIC_ORDERER_LOCALMSPID=OrdererMSP
      - FABRIC_ORDERER_TLS_ENABLED=true
      - FABRIC_ORDERER_TLS_CERTFILE=/etc/hyperledger/fabric/orderer/tls/server.crt
      - FABRIC_ORDERER_TLS_KEYFILE=/etc/hyperledger/fabric/orderer/tls/server.key
      - FABRIC_ORDERER_TLS_ROOTCASFILE=/etc/hyperledger/fabric/orderer/tls/ca.crt
      - FABRIC_ORDERER_OPERATIONS_LISTENADDRESS=0.0.0.0:9443
    volumes:
      - orderer-data:/etc/hyperledger/fabric/orderer
      - ./config:/etc/hyperledger/fabric/orderer
    command: orderer
    networks:
      - fabric-network
    depends_on:
      - ca

  # Peer Node
  peer:
    image: hyperledger/fabric-peer:latest
    container_name: fabric-peer
    ports:
      - "7051:7051"
      - "7053:7053"
    environment:
      - CORE_PEER_ID=peer0.org1.example.com
      - CORE_PEER_ADDRESS=peer0.org1.example.com:7051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:7051
      - CORE_PEER_CHAINCODEADDRESS=peer0.org1.example.com:7052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:7052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.org1.example.com:7051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.org1.example.com:7051
      - CORE_PEER_LOCALMSPID=Org1MSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERTFILE=/etc/hyperledger/fabric/peer/tls/server.crt
      - CORE_PEER_TLS_KEYFILE=/etc/hyperledger/fabric/peer/tls/server.key
      - CORE_PEER_TLS_ROOTCASFILE=/etc/hyperledger/fabric/peer/tls/ca.crt
      - CORE_PEER_OPERATIONS_LISTENADDRESS=0.0.0.0:9444
      - FABRIC_CFG_PATH=/etc/hyperledger/fabric
    volumes:
      - peer-data:/etc/hyperledger/fabric
      - ./config:/etc/hyperledger/fabric/peer
    command: peer node start
    networks:
      - fabric-network
    depends_on:
      - ca
      - orderer

volumes:
  ca-data:
  orderer-data:
  peer-data:

networks:
  fabric-network:
    driver: bridge